# ── Testimonials ────────────────────────────────────────
testimonials:
  - quote:  "On a coupé les téléphones dès le premier soir. Le poêle, les balades en forêt, les repas sans se presser — on est repartis complètement ressourcés. On revient l'année prochaine."
    author: "Marc & Julie"
    date:   "Août 2024"
  - quote:  "Un chalet magnifique, parfaitement équipé et d'une propreté irréprochable. La forêt tout autour est envoûtante. Nos enfants ne voulaient plus repartir — et franchement, nous non plus."
    author: "Sophie T."
    date:   "Juillet 2024"
  - quote:  "L'endroit idéal pour se ressourcer en couple. Le silence, la nature, la qualité des lieux... tout était parfait. On a passé les soirées au coin du feu avec une bouteille de vin — que demander de plus ?"
    author: "Pierre & Camille"
    date:   "Octobre 2024"
