# ── Concept Sections ────────────────────────────────────
concept:
  - number:      "01"
    label:       "L'Intérieur"
    label_en:    "The Interior"
    title:       "Chaleureux et bien équipé"
    title_en:    "Warm and well-equipped"
    description: >
      Grand salon avec une belle baie vitrée, un poêle à bois pour les soirées fraîches, et une cuisine
      complète pour cuisiner tranquillement. L'intérieur est simple et confortable — on n'a pas voulu
      en faire trop, juste ce qu'il faut pour se sentir vraiment chez soi.
    description_en: >
      Spacious living room with large glazed doors, a wood stove for cooler evenings, and a fully equipped
      kitchen for cooking at your own pace. The interior is simple and comfortable — nothing overdone,
      just what you need to feel truly at home.
    image:        "/assets/images/bedroom-1.jpg"
    image_alt:    "Salon du chalet avec baie vitrée et poêle à bois"
    image_alt_en: "Chalet living room with glass wall and wood stove"
    image2:       "/assets/images/bedroom-2.jpg"
    image_alt2:   "Chambre cosy en bois avec literie blanche"
    image_alt2_en: "Cosy wooden bedroom with white bedding"
    image3:       "/assets/images/kitchen.jpg"
    image_alt3:   "Cuisine entièrement équipée du chalet"
    image_alt3_en: "Fully equipped chalet kitchen"
    reverse:      false
    features:
      - { icon: "flame",     text: "Poêle scandinave en fonte",     text_en: "Cast-iron Scandinavian stove" }
      - { icon: "book-open", text: "Bibliothèque & jeux de société", text_en: "Library & board games" }
      - { icon: "wifi-off",  text: "Sans WiFi — reconnexion totale", text_en: "No WiFi — total reconnection" }
      - { icon: "coffee",    text: "Cuisine entièrement équipée",    text_en: "Fully equipped kitchen" }

  - number:      "02"
    label:       "L'Extérieur"
    label_en:    "The Outdoors"
    title:       "La forêt commence au jardin"
    title_en:    "The forest starts at the garden"
    description: >
      Le chalet donne directement sur un sentier balisé. En vingt minutes à pied, on rejoint la
      rivière. Autour, c'est la forêt des Ardennes — des cerfs le matin, le calme tout le temps.
      Idéal pour randonner, se promener, ou ne rien faire du tout.
    description_en: >
      The chalet opens directly onto a marked trail. A twenty-minute walk brings you to the river.
      All around, the Ardennes forest — deer in the morning, quiet all the time. Perfect for hiking,
      strolling, or doing absolutely nothing at all.
    image:        "/assets/images/living-room.jpg"
    image_alt:    "Vue sur la forêt des Ardennes depuis le chalet"
    image_alt_en: "View of the Ardennes forest from the chalet"
    image2:       "/assets/images/forest.jpg"
    image_alt2:   "Terrasse en bois entourée de forêt"
    image_alt2_en: "Wooden terrace surrounded by forest"
    image3:       "/assets/images/mountain.jpg"
    image_alt3:   "Sentier de randonnée en forêt ardennaise"
    image_alt3_en: "Hiking trail in the Ardennes forest"
    reverse:      true
    features:
      - { icon: "footprints", text: "Sentiers de randonnée balisés", text_en: "Marked hiking trails" }
      - { icon: "waves",      text: "Lacs & rivières à proximité",   text_en: "Lakes & rivers nearby" }
      - { icon: "mountain",   text: "Points de vue panoramiques",    text_en: "Panoramic viewpoints" }
      - { icon: "tree-pine",  text: "2 hectares de terrain privé",   text_en: "2 hectares of private land" }

