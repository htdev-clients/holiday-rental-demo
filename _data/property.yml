name:       "Le Refuge Sauvage"
short_name: "Le Refuge"
tagline:    "Chalet & Forêt — Ardennes Belges"
subtitle:   "Ardennes Belges · Séjour nature"
description: "Un chalet en bois dans les Ardennes belges — pour souffler, se promener, et profiter du temps qui passe différemment."
intro: "Le Refuge Sauvage se trouve au cœur des Ardennes belges, entouré d'environ deux hectares de forêt. C'est un endroit calme et confortable, loin de l'agitation du quotidien."
footer_tagline: "Chalet en plein cœur des Ardennes Belges. Une retraite sauvage, loin du bruit du monde."

hero_image:     "/assets/images/hero.jpg"
hero_image_alt: "Chalet dans la forêt des Ardennes"

