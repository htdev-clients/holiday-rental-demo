name:       "Le Refuge Sauvage"
short_name: "Le Refuge"

tagline:
  fr: "Chalet & Forêt — Ardennes Belges"
  en: "Chalet & Forest — Belgian Ardennes"

subtitle:
  fr: "Ardennes Belges · Séjour nature"
  en: "Belgian Ardennes · Nature retreat"

description:
  fr: "Un chalet en bois dans les Ardennes belges — pour souffler, se promener, et profiter du temps qui passe différemment."
  en: "A timber chalet in the Belgian Ardennes — to unwind, hike, and enjoy time passing at a different pace."

intro:
  fr: "Le Refuge Sauvage se trouve au cœur des Ardennes belges, entouré d'environ deux hectares de forêt. C'est un endroit calme et confortable, loin de l'agitation du quotidien."
  en: "Le Refuge Sauvage sits at the heart of the Belgian Ardennes, surrounded by some two hectares of forest. It is a calm and comfortable place, far from the hustle of everyday life."

footer_tagline:
  fr: "Chalet en plein cœur des Ardennes Belges. Une retraite sauvage, loin du bruit du monde."
  en: "A chalet in the heart of the Belgian Ardennes. A wild retreat, far from the noise of the world."

hero_image:     "/assets/images/hero.jpg"
hero_image_alt:
  fr: "Chalet dans la forêt des Ardennes"
  en: "Chalet in the Ardennes forest"

