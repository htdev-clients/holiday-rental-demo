title: Le Refuge Sauvage
description: Location de chalet éco-responsable au cœur des Ardennes Belges.
baseurl: ""
# Deployed URL — must match SITE_URL in wrangler.toml.
# Update both when switching from the Cloudflare Pages domain to a custom domain.
url: "https://holiday-rental-template.pages.dev"

markdown: kramdown

# ── jekyll-picture-tag ──────────────────────────────────
picture:
  output: "generated"
  presets:
    # Full-width hero image
    hero:
      formats: [webp, original]
      widths: [480, 900, 1440, 1920]
      sizes:
        fallback: 100vw
    # Presentation section (interior/exterior, 58 vw on desktop)
    content:
      formats: [webp, original]
      widths: [480, 800, 1170]
      sizes:
        "(min-width: 1024px)": 58vw
        fallback: 100vw
    # Horizontal gallery cards
    gallery:
      formats: [webp, original]
      widths: [400, 800]
      sizes:
        "(min-width: 768px)": 38vw
        fallback: 85vw
permalink: pretty

plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - example.html
