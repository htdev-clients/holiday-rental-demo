{% if page.url == '/' %}{% assign hp = '' %}{% assign logo_href = '#' %}{% else %}{% assign hp = '/' %}{% assign logo_href = '/' %}{% endif %}
<!-- ── Mobile Menu Overlay ── -->
<div id="mobile-menu" class="fixed inset-0 z-[60] bg-earth/97 backdrop-blur-md flex flex-col justify-center items-center gap-8 menu-hidden">
    <button id="close-menu-btn" class="absolute top-6 right-6 text-white hover:text-clay transition-colors">
        <i data-lucide="x" class="w-10 h-10"></i>
    </button>
    <a href="{{ hp }}#presentation" class="mobile-link font-serif text-3xl text-white hover:text-clay italic transition-colors">Le Chalet</a>
    <a href="{{ hp }}#amenities"    class="mobile-link font-serif text-3xl text-white hover:text-clay italic transition-colors">Équipements</a>
    <a href="{{ hp }}#gallery"      class="mobile-link font-serif text-3xl text-white hover:text-clay italic transition-colors">Galerie</a>
    <a href="{{ hp }}#booking"      class="mobile-link font-serif text-3xl text-white hover:text-clay italic transition-colors">Disponibilités</a>
    <a href="{{ hp }}#booking"      class="mobile-link mt-4 px-8 py-3 bg-clay text-white font-bold uppercase tracking-widest text-sm hover:bg-white hover:text-earth transition-colors">Réserver</a>
</div>

<!-- ── Main Nav ── -->
<nav id="main-nav" class="fixed w-full z-50 px-6 py-5 flex justify-between items-center transition-all duration-400 bg-gradient-to-b from-earth/80 to-transparent">
    <a href="{{ logo_href }}" class="text-white font-serif font-bold text-2xl tracking-wider drop-shadow-md">
        {{ site.data.property.name }}.
    </a>

    <div class="hidden md:flex gap-8 text-white text-xs font-semibold tracking-widest uppercase drop-shadow-sm">
        <a href="{{ hp }}#presentation" class="hover:text-clay transition-colors">Le Chalet</a>
        <a href="{{ hp }}#amenities"    class="hover:text-clay transition-colors">Équipements</a>
        <a href="{{ hp }}#gallery"      class="hover:text-clay transition-colors">Galerie</a>
        <a href="{{ hp }}#booking"      class="hover:text-clay transition-colors">Disponibilités</a>
    </div>

    <a href="{{ hp }}#booking" class="hidden md:block bg-clay text-white px-6 py-2 text-xs font-bold uppercase tracking-widest hover:bg-white hover:text-earth transition-colors shadow-lg">
        Réserver
    </a>

    <button id="open-menu-btn" class="md:hidden text-white drop-shadow-md p-2 -mr-2" aria-label="Ouvrir le menu">
        <i data-lucide="menu" class="w-8 h-8"></i>
    </button>
</nav>
