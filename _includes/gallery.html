<section id="gallery" class="py-24 bg-paper overflow-hidden">
    <div class="px-6 md:px-12 mb-12 flex justify-between items-end sr">
        <div>
            <span class="text-clay font-bold uppercase tracking-widest text-xs">Exploration visuelle</span>
            <h2 class="font-serif text-4xl md:text-5xl text-earth mt-2">Galerie</h2>
        </div>
        <div class="flex gap-3">
            <button onclick="scrollGallery('left')"
                class="p-3 border border-earth/30 hover:border-earth hover:bg-earth hover:text-white transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <button onclick="scrollGallery('right')"
                class="p-3 border border-earth/30 hover:border-earth hover:bg-earth hover:text-white transition-all">
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div id="gallery-container" class="flex gap-4 overflow-x-auto hide-scroll snap-x snap-mandatory px-6 md:px-12 pb-6">
        {% for image in site.data.property.gallery %}
        <div class="snap-center shrink-0 w-[85vw] md:w-[38vw]">
            <div class="aspect-[4/3] overflow-hidden bg-earth">
                <img src="{{ image.url }}"
                     alt="{{ image.alt }}"
                     loading="lazy"
                     class="w-full h-full object-cover transition-transform duration-700 hover:scale-105">
            </div>
            <p class="font-serif text-xl italic text-earth mt-3 px-1">{{ image.caption }}</p>
        </div>
        {% endfor %}
    </div>
</section>
